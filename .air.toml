root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/wx-purchase-api ./cmd"
bin = "./tmp/wx-purchase-api"
full_bin = "./tmp/wx-purchase-api"
include_ext = ["go", "tpl", "tmpl", "html", "env"]
exclude_dir = ["tmp", "vendor", ".git"]
delay = 500
stop_on_error = true
send_interrupt = true
kill_delay = "500ms"

[log]
time = true