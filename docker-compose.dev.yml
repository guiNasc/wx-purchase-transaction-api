services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    command: ["air", "-c", ".air.toml"]
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    environment:
      PORT: ${PORT:-8080}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      LOG_FORMAT: ${LOG_FORMAT:-text}

volumes:
  go-mod-cache:
  go-build-cache: